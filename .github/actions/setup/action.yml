name: Setup
description: Setup Node.js and install dependencies

inputs:
  working-directory:
    description: Path to the package to set up (this is a monorepo; the yarn project lives under packages/)
    required: false
    default: packages/shadowlist-fabric

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: ${{ inputs.working-directory }}/.nvmrc

    - name: Cache dependencies
      id: yarn-cache
      uses: actions/cache@v4
      with:
        path: |
          **/node_modules
          ${{ inputs.working-directory }}/.yarn/install-state.gz
        key: ${{ runner.os }}-yarn-${{ hashFiles(format('{0}/yarn.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-yarn-

    - name: Install dependencies
      if: steps.yarn-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable
      shell: bash
      working-directory: ${{ inputs.working-directory }}
