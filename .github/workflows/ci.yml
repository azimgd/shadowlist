name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn workspace shadowlist run test --maxWorkers=2 --coverage

  test-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shadowlist-core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build core tests
        run: |
          cmake -S . -B build
          cmake --build build

      - name: Run core tests
        run: ctest --test-dir build --output-on-failure

      - name: Run core tests (ThreadSanitizer)
        run: |
          c++ -std=c++17 -fsanitize=thread -I.. -I. \
            -DSLT_FIXTURES_DIR="\"$PWD/fixtures\"" \
            ../shadowlist-core/*.cpp tests_*.cpp main.cpp -o run_tests_tsan -pthread
          ./run_tests_tsan

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn workspace shadowlist run prepare

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build the library
        run: yarn workspace shadowlist run prepare

      - name: Install JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/shadowlist-fabric-example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: '-XX:MaxHeapSize=6g'
        run: yarn workspace shadowlist-example run build:android

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build the library
        run: yarn workspace shadowlist run prepare

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/shadowlist-fabric-example

      - name: Cache cocoapods
        id: cocoapods-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/shadowlist-fabric-example/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('packages/shadowlist-fabric-example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install cocoapods
        if: steps.cocoapods-cache.outputs.cache-hit != 'true'
        run: bundle exec pod install
        working-directory: packages/shadowlist-fabric-example/ios
        env:
          NO_FLIPPER: 1

      - name: Build example for iOS
        run: yarn workspace shadowlist-example run build:ios
